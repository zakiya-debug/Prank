<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input{
    width:220px;
    padding:10px;
    margin:10px 0;
}
button{
    padding:10px 20px;
}
img{
    max-width:300px;
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>

    <br><br>

    <img id="chimp" src="Screenshot_2026-07-07.jpg" alt="Chimpanzee">
</div>

<script>
function login(){
    document.getElementById("chimp").style.display="block";
}
</script>

</body>
</html>
